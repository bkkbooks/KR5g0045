front:
  text: 太上出家傳度儀楹九
  hash: sha256:c0327b7d7ce6c7de5ea61ea042453e82998d147bb05702d20a3f89b01bea29f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0045_HFL_000-001a, image: hfl/0989/0989-052.png}
body:
  text: 左街都監同簽書教門公事崇德悟真大師賈善翔編集引弟子於大道前禮三拜上香度師祝香以今焚香供養三清上聖十極髙真玉皇大天帝紫微天皇大帝紫微北極大帝后土皇地祇聖祖天尊大帝元天大聖后三十二天帝君十神太一真君十一曜星官天地水三官南北二斗星官四方二十八宿星官四聖真君三元真君玄中大法師經籍度三師正一真人五嶽聖帝儲副佐命大洞仙官三十六洞天仙官七十二福地三十六靖廬二十四化仙官等四瀆源王四海九江水帝龍王地府酆都北帝出家弟子本命星官宫觀里域真官天曹地府一切威靈今辰謹有某人弟子某人幼離俗網早慕真風今蒙國恩許圎道相啓壇場於兹旦服冠簡於昌時庶竭焚修上報真聖仰冀三境慈尊十方真宰天曹地府一切聖賢曲賜證明少延飊馭稽首皈依無極大道次度師於三師前設案坐華夏引弟子禮度師三拜面北長跪聽説出家因緣設香花供養度師上香謹按真一本際經云爾時青童君問出家之法何如天尊曰夫出家者義趣甚深利益洪遠出家有二種一者恩愛二者諸有始學之人既值明師志能勤苦執事奉承餐受妙訓若在居家父母妻子愛纍相纏如處囹圄不得自在適意從容逺近隨師詢請玄業故告父母請别妻子捨離居室逺遊山林依憑道舍棄俗服玩黃褐玄巾捨世榮華隨緣告乞廣建福田惟道是務是名初出恩愛之家既出家巳勤行齋戒免離三塗信根巳立學靜入室離三界愛登入九清是名出諸有之家也青童君曰我今乃離三惡道願得出離諸有家不知何者名立正教天尊曰若有經文具十二部應三洞者是名正經自此之外須辨邪正方可受持當自請師審定分别青童君聞是説巳歡喜踊躍稽首而退自是及後凡出家之人既辭恩愛來入法門當發神仙行願貴在自利利他屏去凶心惟生善念敬上接下動止柔和每遇設像諸聖諸真諦信不二晨香夜燈圍繞贊歎五體投地禮拜供養惟冀今生來世與道有緣月帔星冠雲軒羽駕名列九天之上位居三島之中且金簡玉書不容妄度五逆十惡穢雜下流若違明科度師獲罪而況太上垂經天尊説戒遇人不度殃及已身非人而傳禍延祖考所以法門傳授戒愼為先今汝道心深重得生中華仍捨業緣乃趨真教謹按經云人身難得中土難生假使得生正法難遇多迷真道多入邪宗多縱罪根多諸巧詐多恣淫殺多好羣情多愛貪嗔多沈地獄多失人身知此等緣衆生不悟不知正道迷惑者多我今哀見此等衆生故垂教法為説良緣令使知道知身性命皆從道生了悟此因長生人道種子不絶世世為人不生無道之鄉不斷人之根本更能心修正道漸入仙宗永離輪回超升三界汝既以難生而生難遇而遇不迷真道不入邪宗不縱罪根不為巧詐不好淫殺不愛貪嗔如此則骨相合經堪為法器傳經演教佐國度人今遇良辰圎具道相當知此出家因緣勿生疑惑苟有異志即為下鬼汝其諦聽戒之愼之今再白汝今出家一人有慶九祖沾恩況汝骨氣通仙神情合道慕清虛之聖境脫穢濁之樊籠願效駑鈍永歸真聖澡雪形體禠裂俗裝先為召百靈監度五帝證明冀汝名書玉簡體挂霞衣便隨羽客以朝真早獲仙丹而出世今宜先禮帝主次别慈親後成出世之髙人永作登真之上士而今而後只可朝真禮聖不可享鬼拜邪凡所立功先資家國今於庭下拜辭以俟披度次引弟子於庭下北向禮帝王汝欲窺衆妙將悟重玄當脫縫掖之衣即被彩霞之帔永參玉帝上謝人君便長遂於逍遙更不須於趨折教起金母勑自軒皇宜北向禮皇帝四拜次謝先祖汝由先祖積慶福及後昆故捨繁華之緣來持清淨之教惟憑焚誦以致薦修每逢真祭之時輒修拜跪之禮宜望先隴四拜次辭父母汝自違甘旨來入法門雖辜罔極之深恩蓋慕無為之妙道庶持經法以報劬勞由此拜辭有違定省宜辭父母伯叔兄長各四拜次辭親知朋友汝久侍巾瓶致踈交友息芳春之駘蕩樂清境之追遊今披羽衣不復俗禮宜辭親知朋友四拜次華夏引弟子至三師前立知磬請三師法事次三歸依次弟子長跪具白剌自陳如念不得以木簡寫如不用簡紙亦得某伏念螻蟻穢質不自揆量輒罄愚誠願親衆妙兹者幸承睿旨許具冠裳今就度師虔請教戒庶從願念不敢有違苟違明科不辭隂譴某誠惶誠恐謹言禮三拜訖即立次度師讀白文恭以三洞垂文七真演教咸令披度得入妙門功德難思天人稱慶斯乃從凡入聖階淺及深名奏天曹身居仙列苟非宿命寧合因緣汝既自陳道心堅固當報四恩三有以悟獨立重玄今則百靈降格萬聖傾光直須默運虔誠無致褻慢宜請保舉二師為脫俗衣以圎道相次保舉師與脫俗衣先著履度師讃云汝先足躡雙履永離六塵經云千里之行始於足下此一步為初之意也願汝一心奉道履踐靈壇凡所行遊不步凶惡之地常登法會徑陟仙階每遇二漏之時即須改換次繫裙度師讃云裙者羣也以羣統為意羣於道友統以清淨又謂之裳蓋在上為衣在下為裳以表守謙下為常行之法則能如是者災害不生諸聖佑護次著雲袖度師讃云輕剪黃雲裁成法服上以襯霜羅之帔下以統飛霄之裙為中道之衣不可須臾離體次披道服度師讃云道服者乃天尊老君之法服也真聖護持人天讃仰既沾於體當自欽崇可以滅三世之愆尤可以令九先之超度行住坐卧常須護持不可置之以穢器不得雜之以俗衣苟不如是當招惡報次知磬舉仙衣讃上界神仙服天寶自然裳輕盈六銖妙佩服齊三光願今一披奉逍遙不死鄉次頂簮冠度師持於手中讃云汝頂星冠冠者冠也一身之上最處崇髙總括衆髮斗星燦爛嶽勢巍峩像列真之朝元作三洞之妙士不為臣妾蓋假於兹宜其晨夕護持勿令塵埃染汙如自輕慢則天曹奪算念兹在兹則神仙可冀次令弟子就坐側長跪度師與戴冠云與道合同三遍次知磬吟星冠讃煥耀七星冠翩翩降自天授之有科戒宿命應神仙願令一頂戴永保大椿年次執簡度師讃云夫簡者以簡事為言收心斂意為用簡則心專持則有守瞻星禮斗祝聖朝真為道法之光容作人天之儀範能如是者方獲執持次知磬舉三啓頌次度師説十戒弟子長跪夫戒者止惡防非護正摧邪無令傲忽弗敢輕侮今授汝十戒以護身心諦聽受持不可懈怠第一戒者心不惡妬無生隂賊檢口愼過想念在法能持否答云能下同第二戒者守仁不殺憫濟羣生慈愛廣救潤及一切能持否第三戒者守正讓義不欺不盜常行善念損已濟物能持否第四戒者不貪不欲心無放蕩清潔守愼行無點汚能持否第五戒者口無惡言言不華綺內外中直不犯口過能持否第六戒者不得嗔怒調和氣性神無所傷不犯衆惡能持否第七戒者不嫉人勝巳爭競功名每事遜讓退身度人能持否第八戒者不得評論經教訾毀聖文躬心奉法常如對神能持否第九戒者不得爭競是非評論四輩天人咎恨損傷神氣能持否第十戒者舉動施為每合天心常行大慈普度厄難能持否天尊曰戒有二種一者有得二者無得有得戒者三戒五戒十戒二十七戒百八十戒三百大戒止惡防非未達方便名有得戒也止離三塗及人中苦未入道分若識識法畢竟空寂是名正戒無持無犯開正觀門為道根本此名出家持戒也次舉智慧頌次聽度師教戒弟子長跪汝既圎道相初入法門目今已後語默動靜常須念道念經念師名曰三寶作汝皈依處所夫念道寶者能制滅一切惡相猶金剛刀無所不斷猶如猛火無所不燒念有二種一念道身七十二相八十一好具足微妙人間天上三界特尊是我歸依覆護之處二念法身猶如虛空圓滿清靜即是真道亦名真身亦名道性常以正念無間餘心是名念道其次念經寶者有三種洞真洞玄及以洞神係心受持常生信慕存想不移審知是法是出世道無他雜念是名念經若知諸法本無文字正觀實相達其旨趣亦名念經是名善解念經之相其次念師寶師寶者父也我若無師不能得道是故應當逺近隨逐心眼觀想常在目前不替須臾無諸雜想是名念師三念既巳當上報四恩一天地恩二國王恩三生身父母恩四師長恩次當下資三有一資天徒二資地徒三資水徒汝當發大善心晨香暮燈誦經行道於諸大道前幡花果實禮拜供養上願皇帝萬歲家國太平次願生身父母九祖先亡幽顯沾恩已身得道次願師尊長壽法屬興隆次願十方信施常蒙道廕次願江山朋友學道知音早遂初心光榮門族次當誘化一切有情令於三清諸聖結大善緣或建宫觀或造經像或度出家法身此乃自利利他功德無量常須柔弱不得剛強經云柔勝剛弱勝強者是也凡朝禮時節開靜即起入靜即息對諸大衆不得髙聲舉步安庠愼勿粗行苟非病患不得飲酒茹葷每遇齋筵愼勿語笑疊足端坐令人天敬仰接見賔客先自和顔貧富貴賤各隨其心方便應對不得輕於貧賤而奉富貴裙褐冠簡鞋履襯袖務在潔淨勿要鮮華又不得殺一切物命每見人殺當須勸誘他人有短愼勿言之縱有隂私亦勿舉訐若違此戒身謝之後永墮惡趣餓鬼畜生受諸苦報良朋善友常須親近凶徒惡黨輒勿交遊又不得奉事鬼神學諸邪法不惟浼黷清靜之教抑亦自招隂遣或登靈壇或預經席秉簡端謹如對君父晝夜便旋不得向北當解裙褐以就掩隈仍避神祠及諸尊貴事巳淨手方拈法服忽見師長及尊宿暖帽方巾逍遙急須撤去罄折問訊常懷慈憫拯濟危急勿貪名利勿畜貨財勿攻異端勿習幻術勿捨吾教妄親别法勿生健羡以破道心此為修行之要也一動一靜當依十事威儀即無違科背律之譴汝既出家紹隆教法將入衆妙與道合真當須屏去三惡灑落六情勸人忠孝勸人樂善不得隂謀不得是非不得訕謗不得色欲不得輕慢不得以強淩弱不得以勢欺人不得竊盜三寶常住及諸尊像衣冠服色竊之即眉鬚墮落足跛手攣死入寒泉受種種苦報常孝順師尊及汝父母見男官女冠法身遞相供養勿生彼我當異骨成親服飾售用及諸五榖蔬茹等物常宜愛惜見男弟子女弟子常須演經化誘入我法門令悟重玄朝禮聖真五體投地侍奉師長旦夕問安出送入迎稽首珍重持守清淨恬淡無為不以富貴聲利輒動身心宜行隂德以作今世來生因果冀遇神仙證無上道且九先超度乃在於汝九先沈墮乃在於汝汝當洗心刻意注念無差一切聖賢靡不昭鑒今先參禮三師誓依教戒次引新戒禮三師禮經師列真雅誥上聖綸言藴三洞之琅函禮九天之金格青囊紫笈寶閣雲房掌八千之靈篇傳四萬之大劫既為道士先奉經師凡所誦持勿令穢觸當運至誠參禮經師三拜禮籍師玉籙髙真金符上聖主八景之龍章鳳篆藏三清之寶䇿瑶圖衆聖靈音諸天隱語凡為道士須奉籍師每當佩籙行符切在施功布德當運至誠參禮籍師三拜禮度師化導真師拔俗至聖蒙度之者星冠月帔荷指之者大戒沖科漸拋塵土之蹤得遂神仙之列幸為道士切奉度師永荷真休常當信禮當運至誠參禮度師三拜次十二願次學仙頌次回向念善次引新戒禮大道功德次禮度師等太上出家傳度儀
